    <!-- basic operator

    Arithmatic Operator:-
     +,*,-,%,/ 
     
     Assignment operator:-
    =,+=.-=,*=,/=,%=

    logical operator:-

    or ,not,and

    comparisin operartor:-
    
    >=,<=,<,>
     
    Eaqaulity operator:-
    
    == Equality operator
    === strict equality operator

    increament/Decreament  operator:-
      ++,--
-->



     <script>
        console.log(10+20);
        console.log(10*20);
        console.log(10-20);
        console.log(10%5);//Remainder
        console.log(10/3);//Quationt
        console.log("**************************");

        //asignment operator
        // =,+=,*=,/=,%=

        let num1=100;

        console.log(num1);
        num1=num1+5;
        num1+=20;
        console.log(num1);

        num1-=20;
        console.log(num1);

        num1*=3;
        console.log(num1);
       
        num1 /=2;
        console.log(num1);

        num1 %3;
        console.log(num1);

       console.log("**************************");
       

    //logical operator
     // and,not,or( &&,!,||)

     //not
     console.log(5>3);
     console.log(!5>3);//false

     console.log((10>5)||(10>30));// true becouse one condition is true it gives true 
     console.log((20>10)&&(10>7));// false  becouse & operator want both condition true
    

     //comparison operator
      //<,> <=,>= 

     console.log(10<10);//false
     console.log(30>10);//true
     console.log(10<=10);//true 
     console.log(10<=10)//true


    //Equality operator
    // ==,===


    //==  It checks the Equality
    console.log(10==10);//true
    console.log((10=="10"));//true becouse it check only no is same or not.
    console.log((10=="ten"));//false


    //===  it checks the strictly  equality

    console.log(10===10);//true
    console.log((10==="10"));//false becouse it strictly checks the consition
    console.log((10==="ten"));//false
 


    //increament/ decreament operator
    // it Increase the valu by 1

    num1=14;
    console.log(num1);//14
    num1++;//increase the value by one
    console.log(num1);//15


    num1--;//decreases the value by 1
    console.log(num1); 

     </script>
