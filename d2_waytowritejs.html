<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- external Js -->
    <script src="script.js"></script>


<!-- Internal java script -->
    <script>
        alert("Hello all, this ie being written using internal java script")
    </script>

</head>
<body>


    

    <!-- way to write  js

     i.External js:- It is type of javascript which is written in  a saperate file having .js extension and connected to the HTML doc using Script tag.

     ii.Internal Js:- When we write the js code in the code HTML document using Scripttag  it is called internal Js.

     iii. inline js:-when the js code is written in the body of the openining tag of any element, its called as inline js.



     -->


     <button onclick="alert('Hello there! this is display from inline JS.')">Click Me</button>
</body>
</html>
